<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{subject}}</title>
    <style>
      body {
        background-color: #f4f4f4;
        padding: 30px;
        font-family: 'Arial', sans-serif;
        color: #333;
        margin: 0;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        background-color: #ffffff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .logo {
        text-align: center;
        margin-bottom: 20px;
      }
      .logo img {
        width: 100%;
        height: auto;
        max-width: 200px;
      }
      h1 {
        font-size: 28px;
        text-align: center;
        color: #2c7a7b;
        padding: 15px;
        margin-bottom: 20px;
        font-weight: bold;
        letter-spacing: 1px;
      }
      h2 {
        font-size: 22px;
        margin-bottom: 15px;
        color: #2c7a7b;
      }
      p {
        font-size: 16px;
        line-height: 1.6;
        color: #4a5568;
        margin-bottom: 15px;
      }
      a.btn {
        display: inline-block;
        margin: 20px 0;
        padding: 12px 24px;
        color: #ffffff;
        background-color: #38b2ac;
        border-radius: 5px;
        text-decoration: none;
        font-weight: bold;
      }
      a.btn:hover {
        background-color: #319795;
      }
      .footer {
        margin-top: 30px;
        text-align: center;
        font-size: 14px;
        color: #718096;
        border-top: 1px solid #e2e8f0;
        padding-top: 20px;
      }
      .footer a {
        color: #38b2ac;
        text-decoration: none;
      }
      .footer a:hover {
        text-decoration: underline;
      }
      @media only screen and (max-width: 600px) {
        body {
          padding: 10px;
        }
        .container {
          padding: 15px;
        }
        h1 {
          font-size: 24px;
        }
        h2 {
          font-size: 20px;
        }
        p {
          font-size: 14px;
        }
        a.btn {
          padding: 10px 20px;
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <img src="https://res.cloudinary.com/dgbopjzbu/image/upload/v1730267458/Omm_kgrqpy.png" alt="Global Onesmos Missionary Movement Logo" />
      </div>
      <h1>{{subject}}</h1>
      <h2>Dear Subscriber,</h2>
      <p>{{message}}</p>
      <p style="text-align: center;">
        <a href="https://www.ommglobal.org/missions" class="btn">Explore Upcoming Missions</a>
      </p>
      <div class="footer">
        <p>Best regards,</p>
        <p><strong>Dr. Jiregna Chali (MD)</strong></p>
        <p>Presenter, Global Onesmos Missionary Movement</p>
        <p>
          Email: <a href="mailto:info@ommglobal.org">info@ommglobal.org</a> | Phone: +251-XXX-XXX-XXXX
        </p>
        <p>
          <a href="https://www.ommglobal.org/unsubscribe?email={{email}}">Unsubscribe</a> from these emails
        </p>
      </div>
      <p style="text-align: center; font-style: italic; color: #718096;">
        "Forward Ever, Backward Never!"
      </p>
    </div>
  </body>
</html>
